# Escuchar en el puerto estándar MQTT
listener 1883

# Solo para desarrollo/aprendizaje local — sin usuario/contraseña.
# En un entorno real esto se cambiaría por autenticación.
allow_anonymous true

# Persistencia de mensajes retenidos y sesiones
persistence true
persistence_location /mosquitto/data/

# Logs a archivo y también a la salida estándar del contenedor
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout